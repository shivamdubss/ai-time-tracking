name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 1. Build frontend
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npx vite build

      # 2. Build Python sidecar
      - name: Install Python dependencies
        run: |
          pip install -r backend/requirements-win32.txt
          pip install pyinstaller

      - name: Build Python sidecar
        run: pyinstaller donna-win.spec --noconfirm

      - name: Move sidecar to dist-backend
        run: |
          if (Test-Path dist-backend) { Remove-Item -Recurse dist-backend }
          Move-Item dist/DonnaBackend dist-backend

      # 3. Build Electron app
      - name: Install Electron dependencies
        working-directory: electron
        run: npm ci

      - name: Build Electron app (Windows)
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: donna-windows
          path: dist-electron/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 1. Build frontend
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npx vite build

      # 2. Build Python sidecar
      - name: Install Python dependencies
        run: |
          pip install -r backend/requirements-darwin.txt
          pip install pyinstaller

      - name: Build Python sidecar
        run: pyinstaller donna-mac.spec --noconfirm

      - name: Move sidecar to dist-backend
        run: |
          rm -rf dist-backend
          mv dist/DonnaBackend dist-backend

      # 3. Build Electron app
      - name: Install Electron dependencies
        working-directory: electron
        run: npm ci

      - name: Build Electron app (macOS)
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:mac

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: donna-macos
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            donna-windows/*
            donna-macos/*
          generate_release_notes: true
